/aruco_node_kinect:   
    ros__parameters:
        # Aruco detection parameters
        marker_size: 0.15 # Size of the markers in meters
        aruco_dictionary_id: DICT_4X4_50 # Aruco dictionary type
        # Input topics
        image_topic: /kinect/image_raw # Input image topic
        use_depth_input: false # Use depth image for 3D pose estimation
        depth_image_topic: /kinect/depth/image_raw # Input depth image topic
        camera_info_topic: /kinect/camera_info # Input camera info topic with camera intrinsic parameters
        camera_frame: camera_rgb_optical_frame_kinect # Camera link frame of reference
        # Output topics
        detected_markers_topic: kinect/aruco/markers # Output topic with detected markers (aruco poses + ids)
        markers_visualization_topic: kinect/aruco/poses # Output topic with visualization of detected markers as pose array
        output_image_topic: kinect/aruco/image # Output topic with visualization of detected markers drawn on image

/aruco_node_astra:   
    ros__parameters:
        # Aruco detection parameters
        marker_size: 0.15 # Size of the markers in meters
        aruco_dictionary_id: DICT_4X4_50 # Aruco dictionary type
        # Input topics
        image_topic: /color/image_raw # Input image topic
        use_depth_input: false # Use depth image for 3D pose estimation
        depth_image_topic: /depth/image_raw # Input depth image topic
        camera_info_topic: /color/camera_info # Input camera info topic with camera intrinsic parameters
        camera_frame: camera_color_optical_frame # Camera link frame of reference
        # Output topics
        detected_markers_topic: astra/aruco/markers # Output topic with detected markers (aruco poses + ids)
        markers_visualization_topic: astra/aruco/poses # Output topic with visualization of detected markers as pose array
        output_image_topic: astra/aruco/image # Output topic with visualization of detected markers drawn on image
